<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Remote Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-container">
        <div class="glow-spot blue"></div>
        <div class="glow-spot purple"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header>
            <div class="title-section">
                <h1>Web Remote <span class="badge">PRO</span></h1>
                <p id="ip-display">Connecting...</p>
            </div>
            <div class="status-indicator">
                <span class="status-dot online" id="status-dot"></span>
                <span class="status-text" id="status-text">Online</span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="mouse-tab">
                <span class="material-symbols-outlined">trackpad</span>
                <span>Trackpad</span>
            </button>
            <button class="tab-btn" data-tab="media-tab">
                <span class="material-symbols-outlined">play_circle</span>
                <span>Media</span>
            </button>
            <button class="tab-btn" data-tab="keyboard-tab">
                <span class="material-symbols-outlined">keyboard</span>
                <span>Keyboard</span>
            </button>
            <button class="tab-btn" data-tab="system-tab">
                <span class="material-symbols-outlined">settings</span>
                <span>System</span>
            </button>
        </div>

        <!-- Main Content -->
        <main class="tab-content">
            <!-- Mouse/Trackpad Tab -->
            <section id="mouse-tab" class="tab-pane active">
                <div class="trackpad-container">
                    <div id="trackpad" class="trackpad">
                        <span class="trackpad-label">Slide to Move • Tap to Click</span>
                        <div class="trackpad-scroll-zone">
                            <span class="material-symbols-outlined">unfold_more</span>
                            <span>Scroll</span>
                        </div>
                    </div>
                </div>
                
                <div class="click-buttons">
                    <button class="btn click-btn btn-glass" id="btn-left-click">LEFT</button>
                    <button class="btn click-btn btn-glass" id="btn-middle-click">MID</button>
                    <button class="btn click-btn btn-glass" id="btn-right-click">RIGHT</button>
                </div>
            </section>

            <!-- Media Controls Tab -->
            <section id="media-tab" class="tab-pane">
                <div class="media-container glass-card">
                    <div class="volume-status">
                        <span class="material-symbols-outlined">volume_up</span>
                        <span id="volume-label">Volume: --</span>
                    </div>

                    <div class="media-row">
                        <button class="btn media-btn btn-glass" id="btn-vol-down">
                            <span class="material-symbols-outlined">volume_down</span>
                        </button>
                        <button class="btn media-btn btn-glass mute-btn" id="btn-mute">
                            <span class="material-symbols-outlined">volume_off</span>
                        </button>
                        <button class="btn media-btn btn-glass" id="btn-vol-up">
                            <span class="material-symbols-outlined">volume_up</span>
                        </button>
                    </div>

                    <div class="media-row playback-row">
                        <button class="btn media-btn btn-glass" id="btn-prev">
                            <span class="material-symbols-outlined">skip_previous</span>
                        </button>
                        <button class="btn media-btn btn-glass play-pause-btn" id="btn-play-pause">
                            <span class="material-symbols-outlined">play_arrow</span>
                        </button>
                        <button class="btn media-btn btn-glass" id="btn-next">
                            <span class="material-symbols-outlined">skip_next</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Keyboard Tab -->
            <section id="keyboard-tab" class="tab-pane">
                <div class="keyboard-container glass-card">
                    <div class="keyboard-active-area">
                        <span class="material-symbols-outlined keyboard-icon">keyboard</span>
                        <input type="text" id="keyboard-input" class="keyboard-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Tap to open keyboard...">
                    </div>

                    <div class="shortcut-grid">
                        <button class="btn shortcut-btn btn-glass" id="btn-key-esc">Esc</button>
                        <button class="btn shortcut-btn btn-glass" id="btn-key-tab">Tab</button>
                        <button class="btn shortcut-btn btn-glass" id="btn-key-super">Super</button>
                        <button class="btn shortcut-btn btn-glass" id="btn-key-space">Space</button>
                        <button class="btn shortcut-btn btn-glass" id="btn-key-backspace">Backspace</button>
                        <button class="btn shortcut-btn btn-glass" id="btn-key-enter">Enter</button>
                    </div>

                    <div class="dpad-container">
                        <div class="dpad">
                            <button class="btn dpad-btn btn-glass up" id="btn-key-up">
                                <span class="material-symbols-outlined">arrow_drop_up</span>
                            </button>
                            <button class="btn dpad-btn btn-glass left" id="btn-key-left">
                                <span class="material-symbols-outlined">arrow_left</span>
                            </button>
                            <div class="dpad-center"></div>
                            <button class="btn dpad-btn btn-glass right" id="btn-key-right">
                                <span class="material-symbols-outlined">arrow_right</span>
                            </button>
                            <button class="btn dpad-btn btn-glass down" id="btn-key-down">
                                <span class="material-symbols-outlined">arrow_drop_down</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- System Tab -->
            <section id="system-tab" class="tab-pane">
                <div class="system-container glass-card">
                    <h3>Power & Session</h3>
                    <div class="system-grid">
                        <button class="btn system-btn btn-glass" id="btn-sys-lock">
                            <span class="material-symbols-outlined">lock</span>
                            <span>Lock Session</span>
                        </button>
                        <button class="btn system-btn btn-glass" id="btn-sys-suspend">
                            <span class="material-symbols-outlined">nights_stay</span>
                            <span>Suspend</span>
                        </button>
                        <button class="btn system-btn btn-glass danger" id="btn-sys-reboot">
                            <span class="material-symbols-outlined">restart_alt</span>
                            <span>Reboot</span>
                        </button>
                        <button class="btn system-btn btn-glass danger" id="btn-sys-poweroff">
                            <span class="material-symbols-outlined">power_settings_new</span>
                            <span>Power Off</span>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>

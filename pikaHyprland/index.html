<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetShare Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --surface: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        .card {
            background: var(--surface);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            opacity: 0.6;
            margin: 20px 0 40px 0;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 20px 50px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px var(--accent-glow);
        }

        .status {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #4dff88;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #4dff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #4dff88;
        }

        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.1;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="glow" style="top: -100px; left: -100px;"></div>
    <div class="glow" style="bottom: -100px; right: -100px;"></div>

    <div class="container">
        <div class="card">
            <div class="icon">🚀</div>
            <h1>MeetShare Pro</h1>
            <p>Native MPV Integration for Google Meet</p>
            
            <button class="btn" onclick="launch()">Open Video in MPV</button>

            <div class="status">
                <div class="dot"></div>
                Bridge Active on Port 9999
            </div>
        </div>
    </div>

    <script>
        async function launch() {
            try {
                const res = await fetch('/api/launch_mpv');
                const data = await res.json();
                if (data.status === 'success') {
                    alert("🚀 MPV Started: " + data.file + "\n\nNow share the MPV window in Google Meet! Audio is synced.");
                }
            } catch (err) {
                alert("Error: " + err.message);
            }
        }
    </script>
</body>
</html>
